app = "birdeye-backend"
primary_region = "sin"        # Singapore — closest to amazon.in / BrightData ingress

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 15

[[vm]]
  memory = "1gb"              # Chromium (Snapshots panel) peaks ~600 MB while running
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/docs"
    port = 8080
    timeout = "10s"
    type = "http"
