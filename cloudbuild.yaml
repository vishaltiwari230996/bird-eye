# cloudbuild.yaml — builds the Docker image and deploys to Cloud Run.
#
# Usage (one-time manual trigger):
#   gcloud builds submit --config backend/cloudbuild.yaml backend/
#
# Or connect this repo to Cloud Build triggers for auto-deploy on push.
#
# Required substitutions (set in Cloud Build trigger UI or --substitutions flag):
#   _REGION          e.g. asia-south1
#   _SERVICE         e.g. birdeye-backend
#   _IMAGE           e.g. gcr.io/YOUR_PROJECT/birdeye-backend

substitutions:
  _REGION: asia-south1          # Mumbai — closest to amazon.in
  _SERVICE: birdeye-backend
  _IMAGE: gcr.io/$PROJECT_ID/birdeye-backend

steps:
  # 1. Build the container image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_IMAGE:$SHORT_SHA
      - -t
      - $_IMAGE:latest
      - .
    dir: backend

  # 2. Push to Container Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_IMAGE

  # 3. Deploy to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_IMAGE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0          # cold starts still cheap; Chromium fits in 1 GiB
      - --max-instances=3
      - --memory=1Gi               # FastAPI + httpx + psycopg2 + Chromium (Snapshots panel)
      - --cpu=1
      - --timeout=1500             # snapshot cron can take ~15-20 min for 40 SKUs
      - --concurrency=20
      - --set-env-vars=APP_ENV=production
      - --set-secrets=DATABASE_URL=birdeye-db-url:latest,OPENROUTER_API_KEY=birdeye-openrouter-key:latest,CRON_SECRET=birdeye-cron-secret:latest,BRIGHTDATA_TOKEN=birdeye-brightdata-token:latest,BRIGHTDATA_DATASET_ID=birdeye-brightdata-dataset:latest,BRIGHTDATA_SELLERS_DATASET_ID=birdeye-brightdata-sellers-dataset:latest,PROXY_URL=birdeye-proxy-url:latest,FRONTEND_URL=birdeye-frontend-url:latest

images:
  - $_IMAGE:$SHORT_SHA
  - $_IMAGE:latest

options:
  logging: CLOUD_LOGGING_ONLY
